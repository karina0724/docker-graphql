name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin
        
    - name: Build the Docker image
      run: |
        docker build -t karina987/docker-graphql:0.0.1 .
        docker build -t karina987/docker-graphql:latest .
      
    - name: Push the Docker image
      run: |
        docker push karina987/docker-graphql:0.0.1
        docker push karina987/docker-graphql:latest

    - name: Docker logout & cleanup
      if: always()
      run: |
        docker logout
        rm -f ~/.docker/config.json
